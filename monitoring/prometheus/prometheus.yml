global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: "college-backend"
    metrics_path: /metrics
    static_configs:
      - targets:
          - backend:5000
          - host.docker.internal:30080

  - job_name: "prometheus"
    static_configs:
      - targets:
          - prometheus:9090
